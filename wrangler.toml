name = "todo-service"
main = "src/index.ts"
compatibility_date = "2025-01-10"
compatibility_flags = ["nodejs_compat"]

# Persist/query logs in dashboard (Workers Observability)
[observability]
enabled = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "todo-db"
database_id = "b8c3dc95-81fc-4794-a101-deb8d100102c"

[vars]
FIREBASE_PROJECT_ID = "todos-c1b87"
ENVIRONMENT = "development"
